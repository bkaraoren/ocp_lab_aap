apiVersion: v1
kind: ServiceAccount
metadata:
  name: cert-checker
  namespace: cert-monitor
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cert-checker-reader
rules:
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["letsencrypt-wildcard"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cert-checker-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cert-checker-reader
subjects:
- kind: ServiceAccount
  name: cert-checker
  namespace: cert-monitor
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cert-checker-secret-reader
  namespace: openshift-ingress
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cert-checker-reader
subjects:
- kind: ServiceAccount
  name: cert-checker
  namespace: cert-monitor
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cert-checker-script
  namespace: cert-monitor
data:
  check-cert.py: |
    #!/usr/bin/env python3
    import json, ssl, base64, time, urllib.request, datetime

    PUSHGATEWAY_URL = "http://pushgateway.cert-monitor.svc:9091/metrics/job/cert-expiry-checker"
    SECRET_NS = "openshift-ingress"
    SECRET_NAME = "letsencrypt-wildcard"

    token_path = "/var/run/secrets/kubernetes.io/serviceaccount/token"
    ca_path = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
    api = "https://kubernetes.default.svc"

    with open(token_path) as f:
        token = f.read().strip()

    ctx = ssl.create_default_context(cafile=ca_path)
    url = f"{api}/api/v1/namespaces/{SECRET_NS}/secrets/{SECRET_NAME}"
    req = urllib.request.Request(url, headers={"Authorization": f"Bearer {token}"})

    print(f"Fetching TLS secret {SECRET_NS}/{SECRET_NAME}...")
    resp = urllib.request.urlopen(req, context=ctx, timeout=10)
    secret_data = json.loads(resp.read())
    cert_b64 = secret_data["data"]["tls.crt"]
    cert_pem = base64.b64decode(cert_b64)

    first_cert = cert_pem.decode().split("-----END CERTIFICATE-----")[0] + "-----END CERTIFICATE-----\n"
    with open("/tmp/cert.pem", "w") as f:
        f.write(first_cert)

    cert_info = ssl._ssl._test_decode_cert("/tmp/cert.pem")
    not_after = cert_info["notAfter"]  # e.g. "May 24 15:31:00 2026 GMT"
    subject = dict(x[0] for x in cert_info["subject"])
    domain = subject.get("commonName", "unknown")

    expiry_dt = datetime.datetime.strptime(not_after, "%b %d %H:%M:%S %Y %Z").replace(
        tzinfo=datetime.timezone.utc
    )
    expiry_epoch = int(expiry_dt.timestamp())
    now_epoch = int(time.time())
    days_left = (expiry_epoch - now_epoch) // 86400

    print(f"Certificate CN={domain} expires: {not_after} ({days_left} days left)")

    metrics = (
        f"# HELP cert_expiry_days Days until TLS certificate expires\n"
        f"# TYPE cert_expiry_days gauge\n"
        f'cert_expiry_days{{domain="{domain}"}} {days_left}\n'
        f"# HELP cert_expiry_timestamp_seconds Unix timestamp when certificate expires\n"
        f"# TYPE cert_expiry_timestamp_seconds gauge\n"
        f'cert_expiry_timestamp_seconds{{domain="{domain}"}} {expiry_epoch}\n'
    )

    req = urllib.request.Request(
        PUSHGATEWAY_URL,
        data=metrics.encode(),
        method="POST"
    )
    urllib.request.urlopen(req, timeout=5)
    print("Metrics pushed to Pushgateway successfully.")
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cert-expiry-checker
  namespace: cert-monitor
  labels:
    app: cert-expiry-checker
spec:
  schedule: "0 6 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          serviceAccountName: cert-checker
          restartPolicy: OnFailure
          containers:
          - name: checker
            image: python:3.12-alpine
            command: ["python3", "/scripts/check-cert.py"]
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                cpu: 100m
                memory: 64Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
              runAsNonRoot: true
              seccompProfile:
                type: RuntimeDefault
            volumeMounts:
            - name: script
              mountPath: /scripts
          volumes:
          - name: script
            configMap:
              name: cert-checker-script
              defaultMode: 0755
