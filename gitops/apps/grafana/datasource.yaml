# Prometheus data source for Grafana
# Uses the grafana-sa ServiceAccount token to access Thanos querier
# NOTE: The secureJsonData.httpHeaderValue1 must be updated with the actual SA token
#       after deployment: oc get secret grafana-sa-token -n grafana -o jsonpath='{.data.token}' | base64 -d
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: prometheus-ocp
  namespace: grafana
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  datasource:
    name: Prometheus-OCP
    type: prometheus
    access: proxy
    url: https://thanos-querier.openshift-monitoring.svc.cluster.local:9091
    isDefault: true
    jsonData:
      httpHeaderName1: Authorization
      timeInterval: "60s"
      tlsSkipVerify: true
    secureJsonData:
      httpHeaderValue1: "Bearer <REPLACE_WITH_GRAFANA_SA_TOKEN>"
    editable: true
