# Loki datasources for Grafana - token must be replaced after deployment
# Get token: oc get secret grafana-loki-reader-token -n openshift-logging -o jsonpath='{.data.token}' | base64 -d
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: loki-logs
  namespace: grafana
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  datasource:
    name: Loki-OCP
    type: loki
    uid: loki-ocp
    url: https://logging-loki-gateway-http.openshift-logging.svc:8080/api/logs/v1/application/
    access: proxy
    isDefault: false
    jsonData:
      httpHeaderName1: Authorization
      tlsSkipVerify: true
    secureJsonData:
      httpHeaderValue1: "Bearer <REPLACE_WITH_GRAFANA_LOKI_READER_TOKEN>"
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: loki-infra-logs
  namespace: grafana
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  datasource:
    name: Loki-Infra
    type: loki
    uid: loki-infra
    url: https://logging-loki-gateway-http.openshift-logging.svc:8080/api/logs/v1/infrastructure/
    access: proxy
    isDefault: false
    jsonData:
      httpHeaderName1: Authorization
      tlsSkipVerify: true
    secureJsonData:
      httpHeaderValue1: "Bearer <REPLACE_WITH_GRAFANA_LOKI_READER_TOKEN>"
