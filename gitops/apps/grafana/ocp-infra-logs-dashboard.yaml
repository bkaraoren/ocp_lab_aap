apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: ocp-infra-logs
  namespace: grafana
spec:
  allowCrossNamespaceImport: false
  instanceSelector:
    matchLabels:
      dashboards: grafana
  json: "{\n  \"annotations\": { \"list\": [] },\n  \"editable\": true,\n  \"graphTooltip\": 1,\n  \"panels\": [\n    {\n      \"collapsed\": false,\n      \"gridPos\": { \"h\": 1, \"w\": 24, \"x\": 0,\
    \ \"y\": 0 },\n      \"title\": \"Infrastructure Log Volume\",\n      \"type\": \"row\"\n    },\n    {\n      \"datasource\": { \"type\": \"loki\", \"uid\": \"loki-infra\" },\n      \"fieldConfig\"\
    : { \"defaults\": { \"color\": { \"mode\": \"palette-classic\" }, \"custom\": { \"fillOpacity\": 30, \"lineWidth\": 1, \"stacking\": { \"mode\": \"normal\" } } } },\n      \"gridPos\": { \"h\": 7, \"\
    w\": 24, \"x\": 0, \"y\": 1 },\n      \"options\": { \"legend\": { \"displayMode\": \"table\", \"placement\": \"right\", \"sortBy\": \"Total\", \"sortDesc\": true }, \"tooltip\": { \"mode\": \"multi\"\
    \ } },\n      \"targets\": [{ \"expr\": \"sum by (kubernetes_host) (count_over_time({log_type=\\\"infrastructure\\\"} [1m]))\", \"legendFormat\": \"{{ kubernetes_host }}\" }],\n      \"title\": \"Infrastructure\
    \ Log Volume (lines/min)\",\n      \"type\": \"timeseries\"\n    },\n    {\n      \"collapsed\": false,\n      \"gridPos\": { \"h\": 1, \"w\": 24, \"x\": 0, \"y\": 8 },\n      \"title\": \"Infrastructure\
    \ Error Logs\",\n      \"type\": \"row\"\n    },\n    {\n      \"datasource\": { \"type\": \"loki\", \"uid\": \"loki-infra\" },\n      \"fieldConfig\": { \"defaults\": { \"color\": { \"mode\": \"palette-classic\"\
    \ }, \"custom\": { \"fillOpacity\": 40 } } },\n      \"gridPos\": { \"h\": 6, \"w\": 24, \"x\": 0, \"y\": 9 },\n      \"options\": { \"legend\": { \"displayMode\": \"list\", \"placement\": \"bottom\"\
    \ }, \"tooltip\": { \"mode\": \"multi\" } },\n      \"targets\": [\n        { \"expr\": \"sum(count_over_time({log_type=\\\"infrastructure\\\"} |~ \\\"(?i)error\\\" [5m]))\", \"legendFormat\": \"Errors\"\
    \ },\n        { \"expr\": \"sum(count_over_time({log_type=\\\"infrastructure\\\"} |~ \\\"(?i)warn\\\" [5m]))\", \"legendFormat\": \"Warnings\" }\n      ],\n      \"title\": \"Infrastructure Error &\
    \ Warning Rate\",\n      \"type\": \"timeseries\"\n    },\n    {\n      \"collapsed\": false,\n      \"gridPos\": { \"h\": 1, \"w\": 24, \"x\": 0, \"y\": 15 },\n      \"title\": \"Infrastructure Log\
    \ Stream\",\n      \"type\": \"row\"\n    },\n    {\n      \"datasource\": { \"type\": \"loki\", \"uid\": \"loki-infra\" },\n      \"gridPos\": { \"h\": 14, \"w\": 24, \"x\": 0, \"y\": 16 },\n     \
    \ \"options\": { \"showTime\": true, \"showLabels\": false, \"showCommonLabels\": false, \"wrapLogMessage\": true, \"prettifyLogMessage\": false, \"enableLogDetails\": true, \"sortOrder\": \"Descending\"\
    , \"dedupStrategy\": \"none\" },\n      \"targets\": [{ \"expr\": \"{log_type=\\\"infrastructure\\\"}\", \"legendFormat\": \"\" }],\n      \"title\": \"Infrastructure Logs\",\n      \"type\": \"logs\"\
    \n    }\n  ],\n  \"refresh\": \"30s\",\n  \"schemaVersion\": 39,\n  \"tags\": [\"ocp\", \"infrastructure\", \"logs\", \"loki\"],\n  \"time\": { \"from\": \"now-1h\", \"to\": \"now\" },\n  \"title\"\
    : \"OCP Infrastructure Logs\",\n  \"uid\": \"ocp-infra-logs\"\n}\n"

