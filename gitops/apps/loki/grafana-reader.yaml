# ServiceAccount and RBAC for Grafana to read logs from LokiStack
apiVersion: v1
kind: ServiceAccount
metadata:
  name: grafana-loki-reader
  namespace: openshift-logging
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cluster-logging-application-reader
rules:
  - apiGroups:
      - loki.grafana.com
    resources:
      - application
    resourceNames:
      - logs
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cluster-logging-infrastructure-reader
rules:
  - apiGroups:
      - loki.grafana.com
    resources:
      - infrastructure
    resourceNames:
      - logs
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: grafana-loki-application-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-logging-application-reader
subjects:
  - kind: ServiceAccount
    name: grafana-loki-reader
    namespace: openshift-logging
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: grafana-loki-infrastructure-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-logging-infrastructure-reader
subjects:
  - kind: ServiceAccount
    name: grafana-loki-reader
    namespace: openshift-logging
---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-loki-reader-token
  namespace: openshift-logging
  annotations:
    kubernetes.io/service-account.name: grafana-loki-reader
type: kubernetes.io/service-account-token
